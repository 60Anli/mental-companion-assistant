# 公共默认配置文件。
# 注意：不要在这个文件里写真实密码、API Key、邮箱授权码。
# 私密配置请写到 application-local.yml，或通过环境变量传入。

server:
  # 后端 HTTP 端口。前端 Vite 会把 /api 请求代理到这里。
  port: 8080

spring:
  application:
    # 应用名称，会显示在日志中。
    name: mental-companion-assistant

  datasource:
    # MySQL Connector/J 驱动，Spring Boot 3 推荐使用 com.mysql.cj.jdbc.Driver。
    driver-class-name: com.mysql.cj.jdbc.Driver
    # MySQL 连接地址。
    # 默认连接 Docker MySQL：宿主机 127.0.0.1:3307 -> 容器内 3306，数据库 mental_companion。
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3307/mental_companion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    # MySQL 用户名。
    username: ${MYSQL_USERNAME:root}
    # MySQL 密码。公共配置保持为空，本地在 application-local.yml 或 MYSQL_PASSWORD 中填写。
    password: ${MYSQL_PASSWORD:}

  data:
    redis:
      # Redis 地址，用于保存最近 10 轮短期记忆。
      host: ${REDIS_HOST:127.0.0.1}
      # Redis 端口。
      port: ${REDIS_PORT:6379}
      # Redis 密码。如果 Redis 没有密码，可以留空。
      password: ${REDIS_PASSWORD:}
      # Redis 逻辑库编号。
      database: ${REDIS_DATABASE:0}
      # Redis 连接超时时间。
      timeout: 3s

  servlet:
    multipart:
      # 单个知识库上传文件最大大小。
      max-file-size: 10MB
      # 单次 multipart 请求最大大小。
      max-request-size: 12MB

  mail:
    # SMTP 服务器地址，例如 smtp.qq.com、smtp.163.com、smtp.gmail.com。
    host: ${MAIL_HOST:smtp.example.com}
    # SMTP 端口：465 通常配 SSL，587 通常配 STARTTLS。
    port: ${MAIL_PORT:587}
    # SMTP 登录账号，通常就是发件邮箱地址。
    username: ${MAIL_USERNAME:}
    # SMTP 密码或授权码，通常不是网页登录密码。
    password: ${MAIL_PASSWORD:}
    # 邮件标题和正文编码。
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          # 是否启用 SMTP 登录认证。
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            # 是否启用 STARTTLS。587 端口通常为 true，465 端口通常为 false。
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          ssl:
            # 是否启用 SSL。465 端口通常为 true，587 端口通常为 false。
            enable: ${MAIL_SMTP_SSL_ENABLE:false}

mybatis-plus:
  configuration:
    # 数据库下划线字段自动映射为 Java 驼峰字段。
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键使用数据库自增。
      id-type: auto

jwt:
  # JWT 签名密钥。生产环境应替换为更安全的随机字符串。
  secret: "mental-companion-assistant-demo-secret-please-change-2026"
  # JWT 有效期，单位：分钟。
  expire-minutes: 720

llm:
  # 大模型提供方：
  # openai = OpenAI-compatible API，请求 /v1/chat/completions 和 /v1/embeddings。
  # ollama = 本地 Ollama API，请求 /api/chat 和 /api/embeddings。
  provider: openai
  # 大模型服务基础地址。OpenAI-compatible 服务这里不要带 /v1。
  # 阿里百炼兼容模式示例：https://dashscope.aliyuncs.com/compatible-mode
  base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
  # 在线模型 API Key。公共配置保持为空，本地在 application-local.yml 或 LLM_API_KEY 中填写。
  api-key: ${LLM_API_KEY:}
  # 聊天模型，用于意图识别、风险分类、长期记忆抽取和回复生成。
  model: ${LLM_MODEL:qwen-plus}
  # 嵌入模型，用于知识库切片和用户问题向量化，是 RAG 检索必须的。
  embedding-model: ${LLM_EMBEDDING_MODEL:text-embedding-v3}

mcp:
  # 是否启用标准 MCP 工具调用。true 表示 ChatWorkflowService 通过 MCP Client 调用工具。
  enabled: ${MCP_ENABLED:true}
  client:
    # MCP Server 的 HTTP 入口。默认指向当前后端内置的 /mcp 端点；如果拆成独立 MCP 服务，改成对应服务地址。
    url: ${MCP_CLIENT_URL:http://127.0.0.1:8080/mcp}
    # MCP HTTP 调用访问令牌。为空表示本地开发不校验；上线建议配置为随机长字符串。
    access-token: ${MCP_ACCESS_TOKEN:}
  server:
    # MCP Server 名称，会在 initialize 响应中返回。
    name: ${MCP_SERVER_NAME:mindcare-mcp-server}
    # MCP Server 版本，会在 initialize 响应中返回。
    version: ${MCP_SERVER_VERSION:1.0.0}
    # MCP 协议版本。当前项目按 JSON-RPC MCP 工具调用结构实现。
    protocol-version: ${MCP_PROTOCOL_VERSION:2025-06-18}
    # MCP Server 校验的访问令牌。和 client.access-token 使用同一个环境变量即可。
    access-token: ${MCP_ACCESS_TOKEN:}

fine-tune:
  # 是否启用本地微调模型接入标识。该配置用于运行状态展示和部署切换。
  enabled: ${FINE_TUNE_ENABLED:false}
  # 微调前的基础模型名称。
  base-model: ${FINE_TUNE_BASE_MODEL:Qwen2.5}
  # 适配器类型，例如 LoRA 或 QLoRA。
  adapter-type: ${FINE_TUNE_ADAPTER_TYPE:QLoRA}
  # 本地适配器文件目录。训练产物不进入 Git 仓库。
  adapter-path: ${FINE_TUNE_ADAPTER_PATH:./models/adapters/qwen2.5-mental}
  # 合并或封装到 Ollama 后的本地模型名。
  ollama-model: ${FINE_TUNE_OLLAMA_MODEL:qwen2.5-mental:latest}
  # 训练配置名称，用于管理员页面展示。
  training-profile: ${FINE_TUNE_TRAINING_PROFILE:emotion-dialog-sft}

chroma:
  # Chroma 向量数据库地址。docker-compose 默认暴露在 localhost:8000。
  base-url: ${CHROMA_BASE_URL:http://localhost:8000}
  # Chroma collection 名称，用于保存心理知识库切片。
  collection: ${CHROMA_COLLECTION:mental_companion_knowledge}
  # 每次用户提问检索的知识片段数量。
  top-k: ${CHROMA_TOP_K:4}

retrieval:
  # 检索模式：hybrid = Chroma 向量召回 + Lucene BM25 关键词召回 + RRF 融合；dense = 只用向量；sparse = 只用 BM25。
  mode: ${RETRIEVAL_MODE:hybrid}
  # 向量召回候选数量。通常大于最终 top-k，方便后续融合排序。
  dense-top-k: ${RETRIEVAL_DENSE_TOP_K:8}
  # BM25 关键词召回候选数量。中文分词使用 Lucene SmartChineseAnalyzer。
  sparse-top-k: ${RETRIEVAL_SPARSE_TOP_K:8}
  # RRF 融合排序常数，常用默认值 60；数值越大，头部名次差异影响越平滑。
  rrf-k: ${RETRIEVAL_RRF_K:60}
  # Lucene BM25 本地索引目录。该目录会自动创建，不建议提交到 Git。
  lucene-index-path: ${RETRIEVAL_LUCENE_INDEX_PATH:./data/lucene/knowledge}
  # 启动时是否根据 MySQL 中的 knowledge_chunk 重建 BM25 索引，便于容器重启或索引目录丢失后恢复。
  rebuild-on-startup: ${RETRIEVAL_REBUILD_ON_STARTUP:true}

app:
  excel:
    # 非闲聊 workflow_record 每次追加写入的 Excel 文件。
    workflow-path: ./data/workflow-records.xlsx
    # 管理端导出全部 workflow_record 时的文件目录。
    export-dir: ./data/exported
  mail:
    # 是否真实发送邮件。false 表示不发邮件，只写 SKIPPED 日志；true 表示调用 SMTP 真发。
    enabled: ${MAIL_ENABLED:false}
    # 邮件发件人地址，通常和 spring.mail.username 一样。
    from: ${MAIL_FROM:}
    # 高风险预警收件邮箱。
    alert-receiver: ${MAIL_ALERT_RECEIVER:admin@example.com}
    # 高风险预警邮件中展示的负责老师姓名。
    teacher-name: ${MAIL_TEACHER_NAME:王老师}
    # 高风险预警邮件中展示的负责老师部门。
    teacher-department: ${MAIL_TEACHER_DEPARTMENT:学生心理健康中心}
