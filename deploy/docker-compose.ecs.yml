# 阿里云 ECS 生产环境 Docker Compose（仅基础服务）
# 使用方式：
#   1. 创建环境变量文件: sudo mkdir -p /etc/mental-companion
#   2. 写入密码: sudo tee /etc/mental-companion/infra.env << 'EOF'
#      MYSQL_ROOT_PASSWORD=<强密码>
#      REDIS_PASSWORD=<强密码>
#      EOF
#   3. 启动: docker compose -f deploy/docker-compose.ecs.yml --env-file /etc/mental-companion/infra.env up -d
services:
  mysql:
    image: mysql:8.0
    container_name: mental-companion-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: mental_companion
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.2-alpine
    container_name: mental-companion-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?请设置 REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: mental-companion-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
